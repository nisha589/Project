<!DOCTYPE html>
<html>

<head>
    <title>Kids Learning Quiz</title>
    <link rel="stylesheet" href="game1.css">
</head>

<body>

    <h1>🌟 Kids Learning Quiz 🌟</h1>

    <div class="quiz-box">

        <h2 id="question">Question will appear here</h2>

        <div class="options">
            <button class="btn" onclick="checkAnswer(0)" id="opt0"></button>
            <button class="btn" onclick="checkAnswer(1)" id="opt1"></button>
            <button class="btn" onclick="checkAnswer(2)" id="opt2"></button>
            <button class="btn" onclick="checkAnswer(3)" id="opt3"></button>
        </div>

        <h3>Score: <span id="score">0</span></h3>

        <button class="next" onclick="nextQuestion()">Next Question</button>

    </div>

    <script src="game12.js"></script>

</body>

</html>
